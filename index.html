<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Group Chat — The Gospel According to iMessage</title>
<meta name="description" content="Biblical events reimagined as iMessage-style group conversations. Funny, reverent, and theologically grounded.">
<meta property="og:title" content="The Group Chat — The Gospel According to iMessage">
<meta property="og:description" content="What if the disciples had a group chat?">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐟</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif; overflow: hidden; height: 100dvh; }
  #root { height: 100dvh; max-width: 420px; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden; }
  ::-webkit-scrollbar { width: 0; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeInMenu { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .ep-row { display: flex; gap: 14px; align-items: center; padding: 14px 12px; border-bottom: 1px solid #1C1C1E; cursor: pointer; transition: background 0.15s; animation: fadeInMenu 0.3s ease both; }
  .ep-row:hover, .ep-row:active { background: #1C1C1E; }
  .msg-bubble { background: #1C1C1E; border-radius: 18px; padding: 8px 14px; font-size: 14px; line-height: 1.4; color: #E5E5EA; max-width: 88%; word-wrap: break-word; animation: fadeIn 0.25s ease; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Episode data: each file pushes to window.EPISODES -->
<!-- To add a new episode: create a .js file in episodes/ and add a script tag here in chronological order -->
<script>window.EPISODES = [];</script>
<script src="episodes/01-origin.js"></script>
<script src="episodes/02-cana.js"></script>
<script src="episodes/03-roof.js"></script>
<script src="episodes/04-sermon.js"></script>
<script src="episodes/05-storm.js"></script>
<script src="episodes/06-feeding.js"></script>
<script src="episodes/07-water.js"></script>
<script src="episodes/08-transfiguration.js"></script>
<script src="episodes/09-fishcoin.js"></script>
<script src="episodes/10-greatest.js"></script>
<script src="episodes/11-luke15.js"></script>
<script src="episodes/12-stone.js"></script>
<script src="episodes/13-lazarus.js"></script>
<script src="episodes/14-zacchaeus.js"></script>
<script src="episodes/15-figtree.js"></script>
<script src="episodes/16-temple.js"></script>
<script src="episodes/17-resurrection.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function getInitials(name) {
  return name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
}

function Avatar({ name, color }) {
  return (
    <div style={{
      width: 28, height: 28, borderRadius: "50%", background: color,
      display: "flex", alignItems: "center", justifyContent: "center",
      fontSize: 11, fontWeight: 700, color: "#fff", flexShrink: 0,
      boxShadow: `0 0 0 2px ${color}33`,
    }}>{getInitials(name)}</div>
  );
}

function ChatView({ episode, onBack }) {
  const [visibleCount, setVisibleCount] = useState(0);
  const [started, setStarted] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => {
    if (!started || visibleCount >= episode.messages.length) return;
    const m = episode.messages[visibleCount];
    const delay = m?.type === "system" ? 3200 : Math.random() * 2400 + 1200;
    const t = setTimeout(() => setVisibleCount(c => c + 1), delay);
    return () => clearTimeout(t);
  }, [visibleCount, started]);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [visibleCount]);

  const msgs = episode.messages.slice(0, visibleCount);
  const grouped = msgs.map((m, i, arr) => ({
    ...m,
    showSender: m.type !== "system" && (i === 0 || arr[i - 1].sender !== m.sender || arr[i - 1].type === "system"),
    isLast: m.type !== "system" && (i === arr.length - 1 || arr[i + 1]?.sender !== m.sender || arr[i + 1]?.type === "system"),
  }));

  let headerName = episode.headerName || "The Twelve (+) 🐟";
  if (episode.dynamicHeader) {
    for (let i = msgs.length - 1; i >= 0; i--) {
      const t = msgs[i]?.text || "";
      if (t.includes("named the group") || t.includes("renamed the group")) {
        const match = t.match(/"(.+)"/);
        if (match) { headerName = match[1]; break; }
      }
    }
    if (!msgs.some(m => m.text && (m.text.includes("named") || m.text.includes("renamed")))) {
      headerName = episode.headerName || "New Group";
    }
  }

  const memberCount = episode.dynamicHeader
    ? msgs.filter(m => m.type === "system" && m.text?.includes("added")).length
    : (episode.memberCount || 14);

  return (
    <div style={{ width: "100%", height: "100%", display: "flex", flexDirection: "column", background: "#000", color: "#fff", overflow: "hidden" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 20px 0", fontSize: 12, fontWeight: 600 }}>
        <span>{episode.time}</span>
        <div style={{ width: 80, height: 12, background: "#1C1C1E", borderRadius: 20 }} />
        <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
          <span style={{ fontSize: 11 }}>📶</span>
          <div style={{ width: 22, height: 11, border: "1px solid #fff", borderRadius: 3, padding: 1 }}>
            <div style={{ width: `${episode.battery || 70}%`, height: "100%", background: (episode.battery || 70) <= 30 ? "#FF3B30" : (episode.battery || 70) <= 50 ? "#FFCC00" : "#34C759", borderRadius: 1.5 }} />
          </div>
        </div>
      </div>
      <div style={{ padding: "6px 16px 10px", borderBottom: "1px solid #2C2C2E", display: "flex", alignItems: "center", gap: 12 }}>
        <div onClick={onBack} style={{ fontSize: 28, color: "#0A84FF", cursor: "pointer", padding: "0 4px", lineHeight: 1 }}>‹</div>
        <div style={{ flex: 1, textAlign: "center" }}>
          <div style={{ fontSize: 14, fontWeight: 700 }}>{headerName}</div>
          <div style={{ fontSize: 11, color: "#8E8E93" }}>{memberCount} members</div>
        </div>
        <div style={{ width: 28 }} />
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "12px 12px 20px", display: "flex", flexDirection: "column", gap: 2 }}>
        {!started && (
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16, padding: "40px 20px" }}>
            <div style={{ fontSize: 48 }}>{episode.emoji}</div>
            <div style={{ fontSize: 20, fontWeight: 800, textAlign: "center" }}>{episode.title}</div>
            <div style={{ fontSize: 14, color: "#8E8E93", textAlign: "center", maxWidth: 280 }}>{episode.subtitle}</div>
            <div style={{ fontSize: 12, color: "#636366", textAlign: "center" }}>{episode.location}</div>
            <div style={{ fontSize: 11, color: "#48484A", textAlign: "center", marginTop: 4 }}>{episode.scripture}</div>
            <button onClick={() => { setStarted(true); setVisibleCount(1); }}
              style={{ marginTop: 16, padding: "12px 36px", borderRadius: 24, border: "none", background: "#0A84FF", color: "#fff", fontSize: 15, fontWeight: 600, cursor: "pointer" }}>
              Open Chat
            </button>
          </div>
        )}
        {grouped.map((m, i) => {
          if (m.type === "system") {
            const isChapter = m.text?.includes("📖");
            const isScene = m.text?.includes("Meanwhile") || m.text?.match(/^Day \d/);
            return (
              <div key={i} style={{
                textAlign: "center", padding: (isChapter || isScene) ? "14px 0 6px" : "8px 0",
                fontSize: (isChapter || isScene) ? 13 : 11,
                fontWeight: (isChapter || isScene) ? 700 : 400,
                color: (isChapter || isScene) ? "#E5E5EA" : "#8E8E93",
                fontStyle: (!isChapter && !isScene && (m.text?.includes("added") || m.text?.includes("joined") || m.text?.includes("left") || m.text?.includes("named") || m.text?.includes("renamed") || m.text?.includes("changed") || m.text?.includes("created"))) ? "italic" : "normal",
              }}>{m.text}</div>
            );
          }
          return (
            <div key={i} style={{ display: "flex", gap: 8, alignItems: "flex-end", marginTop: m.showSender ? 10 : 1 }}>
              <div style={{ width: 28, flexShrink: 0 }}>{m.isLast && <Avatar name={m.sender} color={m.color} />}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                {m.showSender && <div style={{ fontSize: 11, fontWeight: 600, color: m.color, marginBottom: 2, marginLeft: 10 }}>{m.sender}</div>}
                <div className="msg-bubble" style={{ borderBottomLeftRadius: m.isLast ? 4 : 18 }}>
                  {m.msg}
                  <span style={{ fontSize: 9, color: "#636366", marginLeft: 8, whiteSpace: "nowrap" }}>{m.time}</span>
                </div>
              </div>
            </div>
          );
        })}
        <div ref={bottomRef} />
      </div>
      {started && (
        <div style={{ padding: "8px 12px 24px", borderTop: "1px solid #2C2C2E", display: "flex", gap: 8, alignItems: "center" }}>
          <div style={{ fontSize: 20, color: "#8E8E93" }}>+</div>
          <div style={{ flex: 1, background: "#1C1C1E", borderRadius: 20, padding: "8px 14px", fontSize: 14, color: "#636366" }}>iMessage</div>
          <div style={{ fontSize: 18, color: "#0A84FF" }}>🎤</div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [selected, setSelected] = useState(null);
  const episodes = window.EPISODES || [];

  if (selected !== null) {
    return <ChatView episode={episodes[selected]} onBack={() => setSelected(null)} />;
  }

  return (
    <div style={{ width: "100%", height: "100%", display: "flex", flexDirection: "column", background: "#000", color: "#fff", overflow: "hidden" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 20px 0", fontSize: 12, fontWeight: 600 }}>
        <span>9:00 AM</span>
        <div style={{ width: 80, height: 12, background: "#1C1C1E", borderRadius: 20 }} />
        <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
          <span style={{ fontSize: 11 }}>📶</span>
          <div style={{ width: 22, height: 11, border: "1px solid #fff", borderRadius: 3, padding: 1 }}>
            <div style={{ width: "100%", height: "100%", background: "#34C759", borderRadius: 1.5 }} />
          </div>
        </div>
      </div>
      <div style={{ padding: "16px 20px 4px" }}>
        <div style={{ fontSize: 28, fontWeight: 800, letterSpacing: -0.5 }}>The Group Chat</div>
        <div style={{ fontSize: 13, color: "#8E8E93", marginTop: 2 }}>The Gospel According to iMessage</div>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "8px 16px 32px" }}>
        {episodes.map((ep, i) => (
          <div key={ep.id} className="ep-row" onClick={() => setSelected(i)} style={{ animationDelay: `${i * 0.03}s` }}>
            <div style={{
              width: 48, height: 48, borderRadius: 14, background: "#1C1C1E",
              display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0,
            }}>{ep.emoji}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8 }}>
                <div style={{ fontSize: 15, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{ep.title}</div>
                <div style={{ fontSize: 11, color: "#8E8E93", flexShrink: 0 }}>Ep {i + 1}</div>
              </div>
              <div style={{ fontSize: 13, color: "#8E8E93", marginTop: 1, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{ep.subtitle}</div>
              <div style={{ fontSize: 11, color: "#48484A", marginTop: 2 }}>{ep.scripture}</div>
            </div>
            <div style={{ color: "#636366", fontSize: 18, flexShrink: 0 }}>›</div>
          </div>
        ))}
        <div style={{ textAlign: "center", padding: "24px 16px 8px", fontSize: 11, color: "#48484A" }}>
          More episodes coming soon ✝️
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
